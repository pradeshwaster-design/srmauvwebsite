/* mobile breakpoint hook */
function useIsMobile() {
  const [m, setM] = useState(window.innerWidth < 768);
  useEffect(() => {
    const h = () => setM(window.innerWidth < 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return m;
}

/* ═══════════════════════════════════════════════════════════════
   UNDERWATER SCENE — Full immersive canvas with fish, jellyfish,
   bubbles, seaweed, light rays, particles
═══════════════════════════════════════════════════════════════ */
function UnderwaterScene({ intensity = 1 }) {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext('2d');
    let raf, W, H, t = 0;

    // ── Entity pools ──────────────────────────────────────────
    const rand = (a, b) => a + Math.random() * (b - a);
    const randInt = (a, b) => Math.floor(rand(a, b));

    // Bubbles
    const bubbles = Array.from({ length: Math.floor(60 * intensity) }, () => ({
      x: rand(0, 1), y: rand(0, 1.2),
      r: rand(1.5, 6),
      vy: rand(0.0003, 0.0009),
      vx: rand(-0.0001, 0.0001),
      wobble: rand(0, Math.PI * 2),
      wobbleSpeed: rand(0.01, 0.03),
      wobbleAmp: rand(0.001, 0.004),
      alpha: rand(0.15, 0.55),
    }));

    // Fish
    const FISH_COLORS = ['rgba(0,229,255,', 'rgba(72,202,228,', 'rgba(0,180,216,', 'rgba(144,224,239,'];
    const fish = Array.from({ length: Math.floor(12 * intensity) }, () => ({
      x: rand(-0.3, 1.3), y: rand(0.1, 0.9),
      vx: rand(-0.0008, 0.0008) || 0.0004,
      vy: rand(-0.0001, 0.0001),
      size: rand(8, 22),
      color: FISH_COLORS[randInt(0, FISH_COLORS.length)],
      alpha: rand(0.25, 0.7),
      tailPhase: rand(0, Math.PI * 2),
      tailSpeed: rand(0.08, 0.18),
      wobble: rand(0, Math.PI * 2),
    }));

    // Jellyfish
    const jellies = Array.from({ length: Math.floor(5 * intensity) }, () => ({
      x: rand(0.05, 0.95), y: rand(0.05, 0.6),
      vy: rand(-0.0001, 0.0001),
      vx: rand(-0.00005, 0.00005),
      size: rand(20, 50),
      phase: rand(0, Math.PI * 2),
      pulseSpeed: rand(0.015, 0.03),
      alpha: rand(0.08, 0.2),
      hue: randInt(170, 220),
    }));

    // Seaweed stalks at bottom
    const weeds = Array.from({ length: Math.floor(16 * intensity) }, () => ({
      x: rand(0, 1),
      height: rand(0.06, 0.18),
      segments: randInt(5, 9),
      phase: rand(0, Math.PI * 2),
      speed: rand(0.008, 0.02),
      width: rand(1.5, 4),
      hue: rand(150, 190),
      alpha: rand(0.2, 0.5),
    }));

    // Light rays from top
    const rays = Array.from({ length: 7 }, () => ({
      x: rand(0.05, 0.95),
      width: rand(0.02, 0.08),
      alpha: rand(0.03, 0.08),
      speed: rand(0.003, 0.008),
      phase: rand(0, Math.PI * 2),
    }));

    // Plankton/particles
    const plankton = Array.from({ length: Math.floor(80 * intensity) }, () => ({
      x: rand(0, 1), y: rand(0, 1),
      r: rand(0.5, 2),
      vx: rand(-0.0001, 0.0001),
      vy: rand(-0.0002, 0.0002),
      alpha: rand(0.05, 0.3),
      phase: rand(0, Math.PI * 2),
      pulseSpeed: rand(0.02, 0.06),
    }));

    const resize = () => { W = c.width = c.offsetWidth; H = c.height = c.offsetHeight; };
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(c);

    // ── Draw helpers ─────────────────────────────────────────
    const drawFish = (f) => {
      const x = f.x * W, y = f.y * H;
      const dir = f.vx >= 0 ? 1 : -1;
      const s = f.size;
      const tail = Math.sin(f.tailPhase) * s * 0.4;
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(dir, 1);
      ctx.globalAlpha = f.alpha;
      // Body
      ctx.beginPath();
      ctx.ellipse(0, 0, s, s * 0.42, 0, 0, Math.PI * 2);
      ctx.fillStyle = f.color + '0.6)';
      ctx.fill();
      // Tail
      ctx.beginPath();
      ctx.moveTo(-s * 0.7, 0);
      ctx.lineTo(-s * 1.3, -s * 0.35 + tail);
      ctx.lineTo(-s * 1.3, s * 0.35 + tail);
      ctx.closePath();
      ctx.fillStyle = f.color + '0.4)';
      ctx.fill();
      // Eye
      ctx.beginPath();
      ctx.arc(s * 0.5, -s * 0.08, s * 0.1, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fill();
      ctx.restore();
    };

    const drawJelly = (j) => {
      const x = j.x * W, y = j.y * H;
      const pulse = 0.85 + 0.15 * Math.sin(j.phase);
      const s = j.size * pulse;
      ctx.save();
      ctx.globalAlpha = j.alpha;
      // Bell
      ctx.beginPath();
      ctx.arc(x, y, s, Math.PI, 0);
      ctx.closePath();
      const g = ctx.createRadialGradient(x, y - s * 0.3, s * 0.1, x, y, s);
      g.addColorStop(0, `hsla(${j.hue},100%,80%,0.9)`);
      g.addColorStop(1, `hsla(${j.hue},80%,60%,0.0)`);
      ctx.fillStyle = g;
      ctx.fill();
      // Tentacles
      const tentCount = 8;
      for (let i = 0; i < tentCount; i++) {
        const tx = x + (i / (tentCount - 1) - 0.5) * s * 1.6;
        const tentLen = s * (1.2 + 0.3 * Math.sin(j.phase + i));
        ctx.beginPath();
        ctx.moveTo(tx, y);
        for (let seg = 0; seg < 6; seg++) {
          const sy = y + (seg / 5) * tentLen;
          const sx = tx + Math.sin(j.phase * 2 + seg * 0.8 + i) * s * 0.12;
          ctx.lineTo(sx, sy);
        }
        ctx.strokeStyle = `hsla(${j.hue},80%,75%,0.4)`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
      ctx.restore();
    };

    const drawSeaweed = (w) => {
      const bx = w.x * W;
      const by = H;
      const segH = (w.height * H) / w.segments;
      ctx.save();
      ctx.globalAlpha = w.alpha;
      ctx.strokeStyle = `hsla(${w.hue},70%,55%,1)`;
      ctx.lineWidth = w.width;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(bx, by);
      for (let i = 0; i < w.segments; i++) {
        const sway = Math.sin(w.phase + t * w.speed + i * 0.7) * (12 + i * 3);
        const cx1 = bx + sway + Math.sin(i) * 5;
        const cy1 = by - (i + 0.5) * segH;
        const cx2 = bx + sway;
        const cy2 = by - (i + 1) * segH;
        ctx.bezierCurveTo(cx1, cy1, cx2, cy1, bx + Math.sin(w.phase + t * w.speed + (i + 1) * 0.7) * (12 + (i + 1) * 3), cy2);
      }
      ctx.stroke();
      ctx.restore();
    };

    const drawRay = (r) => {
      const x = r.x * W;
      const alpha = r.alpha * (0.7 + 0.3 * Math.sin(r.phase + t * r.speed));
      const w = r.width * W;
      const g = ctx.createLinearGradient(x, 0, x + w * 0.5, H * 0.7);
      g.addColorStop(0, `rgba(0,229,255,${alpha})`);
      g.addColorStop(1, 'rgba(0,229,255,0)');
      ctx.save();
      ctx.globalAlpha = 1;
      ctx.beginPath();
      ctx.moveTo(x - w * 0.5, 0);
      ctx.lineTo(x + w * 0.5, 0);
      ctx.lineTo(x + w, H * 0.7);
      ctx.lineTo(x - w * 0.2, H * 0.7);
      ctx.closePath();
      ctx.fillStyle = g;
      ctx.fill();
      ctx.restore();
    };

    // ── Main render loop ─────────────────────────────────────
    const draw = () => {
      t++;
      ctx.clearRect(0, 0, W, H);

      // Light rays (very subtle, behind everything)
      rays.forEach(r => { r.phase += r.speed; drawRay(r); });

      // Seaweed at bottom
      weeds.forEach(w => drawSeaweed(w));

      // Jellyfish
      jellies.forEach(j => {
        j.phase += j.pulseSpeed;
        j.x += j.vx; j.y += j.vy;
        if (j.x < -0.1) j.x = 1.1;
        if (j.x > 1.1) j.x = -0.1;
        j.y = Math.max(0.02, Math.min(0.7, j.y));
        drawJelly(j);
      });

      // Plankton
      plankton.forEach(p => {
        p.phase += p.pulseSpeed; p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
        if (p.y < 0) p.y = 1; if (p.y > 1) p.y = 0;
        const a = p.alpha * (0.5 + 0.5 * Math.sin(p.phase));
        ctx.beginPath();
        ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,229,255,${a})`;
        ctx.fill();
      });

      // Fish
      fish.forEach(f => {
        f.tailPhase += f.tailSpeed;
        f.wobble += 0.02;
        f.x += f.vx + Math.sin(f.wobble) * 0.00005;
        f.y += f.vy + Math.sin(f.wobble * 0.5) * 0.00008;
        if (f.x > 1.4) f.x = -0.3;
        if (f.x < -0.4) f.x = 1.3;
        f.y = Math.max(0.05, Math.min(0.92, f.y));
        drawFish(f);
      });

      // Bubbles (on top)
      bubbles.forEach(b => {
        b.wobble += b.wobbleSpeed; b.y -= b.vy; b.x += b.vx + Math.sin(b.wobble) * b.wobbleAmp;
        if (b.y < -0.02) { b.y = 1.05; b.x = rand(0, 1); }
        if (b.x < 0) b.x = 1; if (b.x > 1) b.x = 0;
        const bx = b.x * W, by = b.y * H;
        ctx.save();
        ctx.globalAlpha = b.alpha;
        // Bubble circle
        ctx.beginPath();
        ctx.arc(bx, by, b.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(0,229,255,0.8)`;
        ctx.lineWidth = 0.6;
        ctx.stroke();
        // Bubble shine
        ctx.beginPath();
        ctx.arc(bx - b.r * 0.3, by - b.r * 0.35, b.r * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fill();
        ctx.restore();
      });

      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, [intensity]);
  return <canvas ref={ref} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }} />;
}

/* Simple lightweight bubbles-only for inner pages */
function Particles({ count = 60 }) {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext('2d');
    let raf, w, h;
    const pts = Array.from({ length: count }, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.8 + 0.4,
      vx: (Math.random() - .5) * .0002,
      vy: -Math.random() * .0004 - .0001,
      a: Math.random() * .5 + .05,
      p: Math.random() * Math.PI * 2,
    }));
    const resize = () => { w = c.width = c.offsetWidth; h = c.height = c.offsetHeight; };
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(c);
    const draw = () => {
      ctx.clearRect(0, 0, w, h);
      pts.forEach(p => {
        p.p += .015; p.x += p.vx; p.y += p.vy;
        if (p.y < -.01) { p.y = 1.01; p.x = Math.random(); }
        if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
        const a = p.a * (.6 + .4 * Math.sin(p.p));
        ctx.beginPath(); ctx.arc(p.x * w, p.y * h, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,229,255,${a})`; ctx.fill();
      });
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, [count]);
  return <canvas ref={ref} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }} />;
}

/* ═══════════════════════════════════════════════════════════════
   SCROLL REVEAL
═══════════════════════════════════════════════════════════════ */
function Reveal({ children, delay = 0, style = {} }) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVis(true); obs.disconnect(); } }, { threshold: .08 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{ opacity: vis ? 1 : 0, transform: vis ? "none" : "translateY(28px)", transition: `opacity .7s ease ${delay}ms, transform .7s ease ${delay}ms`, ...style }}>
      {children}
    </div>
  );
}

   REUSABLE: Glassy Card
═══════════════════════════════════════════════════════════════ */
function GlassCard({ children, style = {}, hover = true }) {
  const [h, setH] = useState(false);
  return (
    <div
      onMouseEnter={() => hover && setH(true)}
      onMouseLeave={() => hover && setH(false)}
      style={{
        background: h ? "rgba(0,229,255,0.05)" : "rgba(255,255,255,0.018)",
        border: `1px solid ${h ? C.borderHover : C.border}`,
        borderRadius: 16,
        backdropFilter: "blur(12px)",
        transition: "all .4s ease",
        boxShadow: h ? "0 0 40px rgba(0,229,255,0.08), 0 20px 60px rgba(0,0,0,.4)" : "0 4px 24px rgba(0,0,0,.3)",
        transform: h ? "translateY(-5px)" : "none",
        ...style,
      }}
    >
      {children}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   REUSABLE: Btn
═══════════════════════════════════════════════════════════════ */
function Btn({ children, onClick, primary = false, small = false }) {
  const [h, setH] = useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setH(true)}
      onMouseLeave={() => setH(false)}
      style={{
        padding: small ? "9px 20px" : "13px 28px",
        background: primary ? (h ? `linear-gradient(135deg,${C.accent2},${C.accent})` : `linear-gradient(135deg,${C.accent},${C.accent2})`) : "transparent",
        color: primary ? C.bg0 : C.accent,
        border: primary ? "none" : `1px solid ${h ? C.accent : "rgba(0,229,255,0.35)"}`,
        borderRadius: 6,
        fontFamily: "'Orbitron',monospace",
        fontWeight: primary ? 700 : 400,
        fontSize: small ? 9 : 10,
        letterSpacing: 2,

        cursor: "pointer",

        transform: h ? "translateY(-2px)" : "none",
        transition: "all .3s ease",
        whiteSpace: "nowrap",
      }}
    >{children}</button>
  );
}

  const nav = (p) => { setPage(p); setMobileOpen(false); window.scrollTo({ top: 0, behavior: "smooth" }); };
  const links = [
    { id: "home", label: "Home" },

    { id: "team", label: "Team" },
    { id: "vehicles", label: "Vehicles" },

            <div>
              <div style={{ fontFamily: "'Orbitron',monospace", fontWeight: 800, fontSize: 13, color: C.accent, letterSpacing: 1.5 }}>TEAM SRM AUV</div>

                textTransform: "uppercase", padding: "4px 0",
                borderBottom: page === id ? `1px solid ${C.accent}` : "1px solid transparent",
                transition: "all .25s",
              }}
                onMouseEnter={e => e.target.style.color = C.accent}
                onMouseLeave={e => e.target.style.color = page === id ? C.accent : C.muted}
              >{label}</button>
            ))}
            <Btn onClick={() => nav("contact")} small primary>Sponsor Us</Btn>
          </div>
          {/* Mobile hamburger */}
          <button onClick={() => setMobileOpen(!mobileOpen)} style={{ display: "none", background: "none", border: "none", color: C.accent, cursor: "pointer", fontSize: 22 }} className="hamburger">☰</button>
        </div>
      </nav>
      {/* Mobile menu */}
      {mobileOpen && (
        <div style={{ position: "fixed", inset: 0, zIndex: 190, background: "rgba(2,12,27,0.98)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 24 }}>

/* ═══════════════════════════════════════════════════════════════
   SCROLL PROGRESS BAR
═══════════════════════════════════════════════════════════════ */
function ScrollProgress() {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const h = () => {
      const s = document.documentElement.scrollTop;
      const max = document.documentElement.scrollHeight - window.innerHeight;
      setPct(max > 0 ? (s / max) * 100 : 0);
    };
    window.addEventListener("scroll", h);
    return () => window.removeEventListener("scroll", h);
  }, []);
  return <div style={{ position: "fixed", top: 0, left: 0, height: 2, width: `${pct}%`, background: `linear-gradient(90deg,${C.accent},${C.accent2})`, zIndex: 300, transition: "width .1s" }} />;
}

/* ═══════════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState("home");
  const [history, setHistory] = useState(["home"]);

  const navigate = (p) => {
    setHistory(prev => [...prev, p]);
    setPage(p);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const goBack = () => {
    if (history.length > 1) {
      const newHistory = history.slice(0, -1);
      setHistory(newHistory);
      const prev = newHistory[newHistory.length - 1];
      setPage(prev);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  };

  const canGoBack = history.length > 1;

  const renderPage = () => {
    switch (page) {
      case "home":         return <HomePage setPage={navigate} />;
      case "about":        return <AboutPage goBack={goBack} canGoBack={canGoBack} />;
      case "team":         return <TeamPage goBack={goBack} canGoBack={canGoBack} />;
      case "vehicles":     return <VehiclesPage setPage={navigate} goBack={goBack} canGoBack={canGoBack} />;
      case "nemo":         return <NemoPage setPage={navigate} goBack={goBack} canGoBack={canGoBack} />;
      case "achievements": return <AchievementsPage goBack={goBack} canGoBack={canGoBack} />;
      case "competitions": return <CompetitionsPage goBack={goBack} canGoBack={canGoBack} />;
      case "gallery":      return <GalleryPage goBack={goBack} canGoBack={canGoBack} />;
      case "contact":      return <ContactPage goBack={goBack} canGoBack={canGoBack} />;
      default:             return <HomePage setPage={navigate} />;
    }
  };

  return (
    <>
      <GlobalStyle />
      <ScrollProgress />
      <Navbar page={page} setPage={navigate} goBack={goBack} canGoBack={canGoBack} />
      <main style={{ paddingTop: 64 }}>
        {renderPage()}
      </main>
      <Footer setPage={navigate} />
    </>
  );
}



  
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
