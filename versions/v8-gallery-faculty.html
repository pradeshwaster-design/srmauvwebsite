/* mobile breakpoint hook */
function useIsMobile() {
  const [m, setM] = useState(window.innerWidth < 768);
  useEffect(() => {
    const h = () => setM(window.innerWidth < 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return m;
}

/* ═══════════════════════════════════════════════════════════════
   UNDERWATER SCENE — Full immersive canvas with fish, jellyfish,
   bubbles, seaweed, light rays, particles
═══════════════════════════════════════════════════════════════ */
function UnderwaterScene({ intensity = 1 }) {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext('2d');
    let raf, W, H, t = 0;

    // ── Entity pools ──────────────────────────────────────────
    const rand = (a, b) => a + Math.random() * (b - a);
    const randInt = (a, b) => Math.floor(rand(a, b));

    // Bubbles
    const bubbles = Array.from({ length: Math.floor(60 * intensity) }, () => ({
      x: rand(0, 1), y: rand(0, 1.2),
      r: rand(1.5, 6),
      vy: rand(0.0003, 0.0009),
      vx: rand(-0.0001, 0.0001),
      wobble: rand(0, Math.PI * 2),
      wobbleSpeed: rand(0.01, 0.03),
      wobbleAmp: rand(0.001, 0.004),
      alpha: rand(0.15, 0.55),
    }));

    // Fish
    const FISH_COLORS = ['rgba(0,229,255,', 'rgba(72,202,228,', 'rgba(0,180,216,', 'rgba(144,224,239,', 'rgba(255,140,60,', 'rgba(255,200,80,', 'rgba(180,120,255,'];
    const fish = Array.from({ length: Math.floor(12 * intensity) }, () => ({
      x: rand(-0.3, 1.3), y: rand(0.1, 0.9),
      vx: rand(-0.0008, 0.0008) || 0.0004,
      vy: rand(-0.0001, 0.0001),
      size: rand(8, 22),
      color: FISH_COLORS[randInt(0, FISH_COLORS.length)],
      alpha: rand(0.25, 0.7),
      tailPhase: rand(0, Math.PI * 2),
      tailSpeed: rand(0.08, 0.18),
      wobble: rand(0, Math.PI * 2),
    }));

    // Jellyfish
    const jellies = Array.from({ length: Math.floor(5 * intensity) }, () => ({
      x: rand(0.02, 0.98), y: rand(0.05, 0.75),
      vy: rand(-0.00015, 0.00015),
      vx: rand(-0.00008, 0.00008),
      size: rand(18, 60),
      phase: rand(0, Math.PI * 2),
      pulseSpeed: rand(0.012, 0.028),
      alpha: rand(0.35, 0.72),
      hue: randInt(160, 300),
      glowRadius: rand(1.2, 2.2),
    }));

    // Coral reefs (clusters at the bottom)
    const coralClusters = Array.from({ length: 8 }, (_, i) => ({
      x: 0.04 + (i / 7) * 0.92,
      y: 1.0,
      phase: rand(0, Math.PI * 2),
      scale: rand(0.45, 0.78),
      hue1: [5, 18, 345, 28, 195, 155, 275, 40][i],
      hue2: [20, 38, 0, 50, 210, 170, 290, 55][i],
      type: i % 3, // 0=branching, 1=fan, 2=mixed
    }));

    // AUV — torpedo-style, linear approach-inspect-depart
    const sortedCorals = [...coralClusters].sort((a, b) => a.x - b.x);
    const auv = {
      x: -0.18, y: 0.80,
      angle: 0,
      speed: 0.00055,
      thrusterPhase: 0,
      scanPhase: 0,
      bobPhase: rand(0, Math.PI * 2),
      targetIdx: 0,
      state: 'cruise',   // 'cruise' | 'slowdown' | 'hover' | 'pan' | 'depart'
      timer: 0,
      scanBeamAlpha: 0,
      thrusterBubbles: [],
      lightFlicker: 1,
      // waypoint for smooth steering
      wpX: 0, wpY: 0,
    };

    // Whale — enters from a random side, stays in mid-lower zone (clear of title)
    const whaleSide = Math.random() > 0.5 ? 1 : -1; // 1=from right→left, -1=from left→right
    const whale = {
      x: whaleSide === 1 ? 1.3 : -0.3,
      y: rand(0.60, 0.70),
      vx: -whaleSide * rand(0.00020, 0.00028), // always moves inward
      vy: 0,
      size: 95,
      phase: 0,
      tailPhase: rand(0, Math.PI * 2),
      alpha: 0,
    };

    // Seaweed stalks at bottom
    const weeds = Array.from({ length: Math.floor(16 * intensity) }, () => ({
      x: rand(0, 1),
      height: rand(0.06, 0.18),
      segments: randInt(5, 9),
      phase: rand(0, Math.PI * 2),
      speed: rand(0.008, 0.02),
      width: rand(1.5, 4),
      hue: rand(150, 190),
      alpha: rand(0.2, 0.5),
    }));

    // Light rays from top
    const rays = Array.from({ length: 7 }, () => ({
      x: rand(0.05, 0.95),
      width: rand(0.02, 0.08),
      alpha: rand(0.03, 0.08),
      speed: rand(0.003, 0.008),
      phase: rand(0, Math.PI * 2),
    }));

    // Plankton/particles
    const plankton = Array.from({ length: Math.floor(80 * intensity) }, () => ({
      x: rand(0, 1), y: rand(0, 1),
      r: rand(0.5, 2),
      vx: rand(-0.0001, 0.0001),
      vy: rand(-0.0002, 0.0002),
      alpha: rand(0.05, 0.3),
      phase: rand(0, Math.PI * 2),
      pulseSpeed: rand(0.02, 0.06),
    }));

    const resize = () => { W = c.width = c.offsetWidth; H = c.height = c.offsetHeight; };
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(c);

    // ── Draw helpers ─────────────────────────────────────────
    const drawFish = (f) => {
      const x = f.x * W, y = f.y * H;
      const dir = f.vx >= 0 ? 1 : -1;
      const s = f.size;
      const tail = Math.sin(f.tailPhase) * s * 0.42;
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(dir, 1);
      ctx.globalAlpha = f.alpha;
      // Body with gradient
      ctx.beginPath();
      ctx.ellipse(0, 0, s, s * 0.40, 0, 0, Math.PI * 2);
      const fg = ctx.createRadialGradient(-s * 0.1, -s * 0.15, 0, 0, 0, s);
      fg.addColorStop(0, f.color + '0.85)');
      fg.addColorStop(0.6, f.color + '0.6)');
      fg.addColorStop(1, f.color + '0.2)');
      ctx.fillStyle = fg;
      ctx.fill();
      // Belly shine
      ctx.beginPath();
      ctx.ellipse(s * 0.05, s * 0.1, s * 0.4, s * 0.18, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fill();
      // Dorsal fin
      ctx.beginPath();
      ctx.moveTo(-s * 0.1, -s * 0.38);
      ctx.bezierCurveTo(s * 0.05, -s * 0.65, s * 0.25, -s * 0.58, s * 0.3, -s * 0.38);
      ctx.closePath();
      ctx.fillStyle = f.color + '0.5)';
      ctx.fill();
      // Tail
      ctx.beginPath();
      ctx.moveTo(-s * 0.72, 0);
      ctx.lineTo(-s * 1.32, -s * 0.38 + tail);
      ctx.lineTo(-s * 1.18, 0);
      ctx.lineTo(-s * 1.32, s * 0.38 + tail);
      ctx.closePath();
      ctx.fillStyle = f.color + '0.45)';
      ctx.fill();
      // Eye white
      ctx.beginPath();
      ctx.arc(s * 0.52, -s * 0.08, s * 0.11, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fill();
      // Pupil
      ctx.beginPath();
      ctx.arc(s * 0.54, -s * 0.08, s * 0.055, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(10,15,35,1)';
      ctx.fill();
      ctx.restore();
    };

    const drawJelly = (j) => {
      const x = j.x * W, y = j.y * H;
      const pulse = 0.82 + 0.18 * Math.sin(j.phase);
      const s = j.size * pulse;
      ctx.save();

      // Outer glow
      ctx.save();
      ctx.globalAlpha = j.alpha * 0.22;
      const glow = ctx.createRadialGradient(x, y, s * 0.2, x, y, s * (j.glowRadius || 2.0));
      glow.addColorStop(0, `hsla(${j.hue},100%,75%,1)`);
      glow.addColorStop(1, `hsla(${j.hue},100%,60%,0)`);
      ctx.beginPath();
      ctx.arc(x, y, s * (j.glowRadius || 2.0), 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
      ctx.restore();

      ctx.globalAlpha = j.alpha;

      // Bell outer
      ctx.beginPath();
      ctx.arc(x, y, s, Math.PI, 0);
      ctx.closePath();
      const g = ctx.createRadialGradient(x, y - s * 0.35, s * 0.08, x, y, s);
      g.addColorStop(0,   `hsla(${j.hue},100%,90%,0.95)`);
      g.addColorStop(0.4, `hsla(${j.hue},90%,70%,0.55)`);
      g.addColorStop(1,   `hsla(${j.hue},80%,55%,0.0)`);
      ctx.fillStyle = g;
      ctx.fill();

      // Bell rim highlight
      ctx.beginPath();
      ctx.arc(x, y, s, Math.PI, 0);
      ctx.strokeStyle = `hsla(${j.hue},100%,90%,0.55)`;
      ctx.lineWidth = 1.2;
      ctx.stroke();

      // Inner bell structure (ribs)
      ctx.globalAlpha = j.alpha * 0.45;
      for (let r = 0; r < 4; r++) {
        const angle = Math.PI + (r / 3) * Math.PI;
        const rx = x + Math.cos(angle) * s * 0.75;
        const ry = y + Math.sin(angle) * s * 0.35;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(rx, ry);
        ctx.strokeStyle = `hsla(${j.hue},100%,85%,0.6)`;
        ctx.lineWidth = 0.7;
        ctx.stroke();
      }

      // Tentacles
      ctx.globalAlpha = j.alpha * 0.85;
      const tentCount = 10;
      for (let i = 0; i < tentCount; i++) {
        const tx = x + (i / (tentCount - 1) - 0.5) * s * 1.8;
        const tentLen = s * (1.4 + 0.4 * Math.sin(j.phase + i * 0.7));
        ctx.beginPath();
        ctx.moveTo(tx, y);
        for (let seg = 0; seg < 8; seg++) {
          const sy = y + (seg / 7) * tentLen;
          const sx = tx + Math.sin(j.phase * 1.8 + seg * 0.9 + i * 0.5) * s * 0.18;
          ctx.lineTo(sx, sy);
        }
        const tAlpha = 0.6 - (i % 2) * 0.15;
        ctx.strokeStyle = `hsla(${j.hue},90%,80%,${tAlpha})`;
        ctx.lineWidth = i % 3 === 0 ? 1.2 : 0.7;
        ctx.stroke();
      }

      ctx.restore();
    };

    const drawSeaweed = (w) => {
      const bx = w.x * W;
      const by = H;
      const segH = (w.height * H) / w.segments;
      ctx.save();
      ctx.globalAlpha = w.alpha;
      ctx.strokeStyle = `hsla(${w.hue},70%,55%,1)`;
      ctx.lineWidth = w.width;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(bx, by);
      for (let i = 0; i < w.segments; i++) {
        const sway = Math.sin(w.phase + t * w.speed + i * 0.7) * (12 + i * 3);
        const cx1 = bx + sway + Math.sin(i) * 5;
        const cy1 = by - (i + 0.5) * segH;
        const cx2 = bx + sway;
        const cy2 = by - (i + 1) * segH;
        ctx.bezierCurveTo(cx1, cy1, cx2, cy1, bx + Math.sin(w.phase + t * w.speed + (i + 1) * 0.7) * (12 + (i + 1) * 3), cy2);
      }
      ctx.stroke();
      ctx.restore();
    };

    const drawRay = (r) => {
      const x = r.x * W;
      const alpha = r.alpha * (0.7 + 0.3 * Math.sin(r.phase + t * r.speed));
      const w = r.width * W;
      const g = ctx.createLinearGradient(x, 0, x + w * 0.5, H * 0.7);
      g.addColorStop(0, `rgba(0,229,255,${alpha})`);
      g.addColorStop(1, 'rgba(0,229,255,0)');
      ctx.save();
      ctx.globalAlpha = 1;
      ctx.beginPath();
      ctx.moveTo(x - w * 0.5, 0);
      ctx.lineTo(x + w * 0.5, 0);
      ctx.lineTo(x + w, H * 0.7);
      ctx.lineTo(x - w * 0.2, H * 0.7);
      ctx.closePath();
      ctx.fillStyle = g;
      ctx.fill();
      ctx.restore();
    };

    // ── Coral reef draw ────────────────────────────────────────
    const drawCoral = (cl) => {
      const bx = cl.x * W;
      const by = H * 0.998;
      const sc = cl.scale;
      const globalSway = Math.sin(cl.phase + t * 0.006) * 2.5;
      ctx.save();
      ctx.translate(bx, by);

      /* ── Recursive branching coral ── */
      const drawBranch = (x, y, angle, len, width, depth, h1, h2, swayMult) => {
        if (depth === 0 || len < 1.5) return;
        const localSway = globalSway * swayMult;
        const cpx = x + Math.cos(angle + 0.18) * len * 0.5 + localSway * 0.5;
        const cpy = y - Math.sin(angle + 0.18) * len * 0.5;
        const ex = x + Math.cos(angle) * len + localSway * 0.8;
        const ey = y - Math.sin(angle) * len;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.quadraticCurveTo(cpx, cpy, ex, ey);
        const cg = ctx.createLinearGradient(x, y, ex, ey);
        cg.addColorStop(0, `hsla(${h1},72%,32%,1)`);
        cg.addColorStop(0.5, `hsla(${h1 + 8},78%,45%,0.95)`);
        cg.addColorStop(1, `hsla(${h2},88%,60%,0.9)`);
        ctx.strokeStyle = cg;
        ctx.lineWidth = width;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
        if (depth === 1) {
          // Polyp bulb tip
          ctx.beginPath();
          ctx.arc(ex, ey, width * 2.2, 0, Math.PI * 2);
          const pg = ctx.createRadialGradient(ex - width * 0.4, ey - width * 0.4, 0, ex, ey, width * 2.2);
          pg.addColorStop(0, `hsla(${h2 + 15},100%,88%,1)`);
          pg.addColorStop(0.5, `hsla(${h2},95%,68%,0.9)`);
          pg.addColorStop(1, `hsla(${h2},80%,50%,0.4)`);
          ctx.fillStyle = pg;
          ctx.fill();
          // Bioluminescent glow halo
          ctx.save();
          ctx.globalAlpha = 0.18;
          const halo = ctx.createRadialGradient(ex, ey, 0, ex, ey, width * 7);
          halo.addColorStop(0, `hsla(${h2},100%,85%,1)`);
          halo.addColorStop(1, `hsla(${h2},100%,60%,0)`);
          ctx.beginPath(); ctx.arc(ex, ey, width * 7, 0, Math.PI * 2);
          ctx.fillStyle = halo; ctx.fill();
          ctx.restore();
        } else {
          // Texture bump at branch node
          ctx.beginPath();
          ctx.arc(ex, ey, width * 1.1, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${h1},70%,38%,0.7)`;
          ctx.fill();
          const spreadAngle = 0.38 + (4 - depth) * 0.06;
          drawBranch(ex, ey, angle - spreadAngle, len * 0.68, width * 0.62, depth - 1, h1, h2, swayMult * 1.2);
          drawBranch(ex, ey, angle + spreadAngle, len * 0.68, width * 0.62, depth - 1, h1, h2, swayMult * 1.2);
          if (depth >= 3) drawBranch(ex, ey, angle, len * 0.72, width * 0.55, depth - 1, h1, h2, swayMult * 1.1);
        }
      };

      /* ── Staghorn / Acropora ── */
      const drawStaghorn = (ox, oy, h1, h2, sc2) => {
        const stems = 5 + Math.floor(sc2 * 2);
        for (let i = 0; i < stems; i++) {
          const baseAngle = Math.PI / 2 + (i / (stems - 1) - 0.5) * 1.1;
          const sLen = (32 + i % 3 * 8) * sc2;
          drawBranch(ox, oy, baseAngle, sLen, 2.6 * sc2, 4, h1, h2, 0.8 + i * 0.1);
        }
      };

      /* ── Sea fan / Gorgonian ── */
      const drawSeaFan = (ox, oy, h1, h2, fanSc) => {
        const fanR = 36 * fanSc;
        const fanSway = globalSway * 0.6;
        ctx.save();
        ctx.translate(ox + fanSway, oy);
        // Stalk
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -8 * fanSc);
        ctx.strokeStyle = `hsla(${h1},65%,35%,0.9)`; ctx.lineWidth = 2.5 * fanSc; ctx.stroke();
        // Fan mesh — spines
        const spines = 14;
        for (let i = 0; i < spines; i++) {
          const ang = (i / (spines - 1)) * Math.PI;
          const fx = Math.cos(ang) * fanR;
          const fy = -8 * fanSc - Math.sin(ang) * fanR;
          ctx.beginPath(); ctx.moveTo(0, -8 * fanSc);
          ctx.quadraticCurveTo(fx * 0.5 + Math.sin(cl.phase + i) * 3, fy * 0.5, fx, fy);
          ctx.strokeStyle = `hsla(${h1},72%,48%,0.75)`; ctx.lineWidth = 0.9; ctx.stroke();
        }
        // Concentric arcs
        for (let ring = 1; ring <= 4; ring++) {
          ctx.beginPath();
          ctx.arc(0, -8 * fanSc, fanR * ring / 4, Math.PI, 0);
          ctx.strokeStyle = `hsla(${h2},78%,55%,${0.55 - ring * 0.08})`; ctx.lineWidth = 0.7; ctx.stroke();
        }
        ctx.restore();
      };

      /* ── Brain / Favites mound coral ── */
      const drawBrainCoral = (ox, oy, h1, sc2) => {
        const mr = 22 * sc2;
        ctx.save(); ctx.translate(ox, oy);
        // Dome base with shadow
        ctx.beginPath(); ctx.arc(0, 0, mr * 1.05, Math.PI, 0);
        ctx.fillStyle = `hsla(${h1 - 10},50%,18%,0.5)`; ctx.fill();
        // Dome body
        ctx.beginPath(); ctx.arc(0, 0, mr, Math.PI, 0);
        const dg = ctx.createRadialGradient(-mr * 0.25, -mr * 0.5, mr * 0.05, 0, -mr * 0.2, mr * 1.1);
        dg.addColorStop(0, `hsla(${h1},62%,58%,0.95)`);
        dg.addColorStop(0.55, `hsla(${h1},55%,38%,0.9)`);
        dg.addColorStop(1, `hsla(${h1 - 5},48%,22%,0.85)`);
        ctx.fillStyle = dg; ctx.fill();
        // Brain-like grooves (meandering ridges)
        ctx.save(); ctx.globalAlpha = 0.65;
        for (let gi = 0; gi < 6; gi++) {
          ctx.beginPath();
          const gx0 = -mr * 0.75 + gi * mr * 0.3;
          ctx.moveTo(gx0, 0);
          for (let seg = 0; seg <= 8; seg++) {
            const gx = gx0 + Math.sin(seg * 0.8 + gi) * mr * 0.1;
            const gy = -mr * (seg / 8) * 0.95;
            const clampX = Math.max(-mr + 2, Math.min(mr - 2, gx));
            const dist = Math.sqrt(clampX * clampX + gy * gy);
            if (dist < mr - 1) ctx.lineTo(clampX, gy);
          }
          ctx.strokeStyle = `hsla(${h1 + 5},75%,70%,0.7)`; ctx.lineWidth = 1.1; ctx.stroke();
        }
        ctx.restore();
        // Specular highlight
        ctx.save(); ctx.globalAlpha = 0.2;
        ctx.beginPath(); ctx.ellipse(-mr * 0.22, -mr * 0.55, mr * 0.28, mr * 0.18, -0.4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fill(); ctx.restore();
        ctx.restore();
      };

      /* ── Tube/pipe sponge ── */
      const drawTubeSponge = (ox, oy, h1, h2, sc2) => {
        const tubes = 3 + Math.floor(sc2 * 2);
        for (let i = 0; i < tubes; i++) {
          const tx = ox + (i - tubes / 2) * 9 * sc2 + Math.sin(i * 1.3) * 4;
          const tH = (30 + i % 3 * 12) * sc2;
          const tr = (4 + i % 2 * 2) * sc2;
          const tubeSway = globalSway * 0.4;
          // Tube body
          ctx.beginPath();
          ctx.moveTo(tx - tr, oy);
          ctx.bezierCurveTo(tx - tr + tubeSway * 0.3, oy - tH * 0.5, tx - tr + tubeSway, oy - tH, tx + tubeSway, oy - tH);
          ctx.bezierCurveTo(tx + tr + tubeSway, oy - tH, tx + tr + tubeSway * 0.3, oy - tH * 0.5, tx + tr, oy);
          ctx.closePath();
          const tg = ctx.createLinearGradient(tx - tr, oy, tx + tr, oy - tH);
          tg.addColorStop(0, `hsla(${h1},60%,28%,0.9)`);
          tg.addColorStop(1, `hsla(${h2},75%,52%,0.8)`);
          ctx.fillStyle = tg; ctx.fill();
          ctx.strokeStyle = `hsla(${h2},80%,55%,0.6)`; ctx.lineWidth = 0.8; ctx.stroke();
          // Tube rim opening
          ctx.beginPath();
          ctx.ellipse(tx + tubeSway, oy - tH, tr * 1.05, tr * 0.5, 0, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${h1 - 10},55%,18%,0.9)`; ctx.fill();
          ctx.strokeStyle = `hsla(${h2},85%,65%,0.8)`; ctx.lineWidth = 0.9; ctx.stroke();
        }
      };

      /* ── Rocky base for each cluster ── */
      const drawRockyBase = (sc2) => {
        const bw = 75 * sc2;
        ctx.save();
        ctx.globalAlpha = 0.65;
        // Base rock shadow
        ctx.beginPath();
        ctx.ellipse(0, 2, bw * 0.7, 7, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,20,40,0.4)'; ctx.fill();
        // Main rock mound
        ctx.beginPath();
        ctx.moveTo(-bw * 0.55, 0);
        ctx.bezierCurveTo(-bw * 0.5, -12 * sc2, -bw * 0.3, -15 * sc2, 0, -13 * sc2);
        ctx.bezierCurveTo(bw * 0.3, -15 * sc2, bw * 0.5, -11 * sc2, bw * 0.55, 0);
        ctx.closePath();
        const rg = ctx.createLinearGradient(-bw * 0.5, -14 * sc2, bw * 0.5, 0);
        rg.addColorStop(0, 'rgba(40,65,90,0.85)');
        rg.addColorStop(0.5, 'rgba(25,45,65,0.9)');
        rg.addColorStop(1, 'rgba(10,25,45,0.95)');
        ctx.fillStyle = rg; ctx.fill();
        ctx.strokeStyle = 'rgba(60,100,130,0.4)'; ctx.lineWidth = 0.7; ctx.stroke();
        // Rock texture dots
        for (let ri = 0; ri < 8; ri++) {
          ctx.beginPath();
          ctx.arc((ri - 3.5) * 9 * sc2, -4 * sc2 - Math.abs(ri - 3.5) * 1.5, 1.2, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(70,110,145,0.4)'; ctx.fill();
        }
        ctx.restore();
      };

      // Draw the full cluster based on type
      drawRockyBase(sc);
      if (cl.type === 0) {
        drawStaghorn(-20 * sc, 0, cl.hue1, cl.hue2, sc);
        drawBrainCoral(28 * sc, -2 * sc, cl.hue2, sc * 0.8);
        drawTubeSponge(-45 * sc, 0, cl.hue1 + 15, cl.hue2 + 15, sc * 0.7);
      } else if (cl.type === 1) {
        drawSeaFan(-8 * sc, -5 * sc, cl.hue1, cl.hue2, sc);
        drawStaghorn(30 * sc, 0, cl.hue2, cl.hue1, sc * 0.9);
        drawBrainCoral(-38 * sc, -2 * sc, cl.hue1 + 10, sc * 0.75);
      } else {
        drawStaghorn(0, 0, cl.hue1, cl.hue2, sc);
        drawSeaFan(-36 * sc, -5 * sc, cl.hue2, cl.hue1, sc * 0.85);
        drawTubeSponge(38 * sc, 0, cl.hue2 + 20, cl.hue1 + 10, sc * 0.8);
      }
      ctx.restore();
    };

    // ── AUV draw (torpedo-style, heading-aware) ─────────────
    const drawAUV = (av) => {
      const x = av.x * W, y = av.y * H;

      // Draw thruster bubbles in world space before transform
      av.thrusterBubbles.forEach(b => {
        b.wx += b.dvx; b.wy += b.dvy; b.phase += 0.1; b.alpha -= 0.016; b.r += 0.09;
        const bAlpha = Math.max(0, b.alpha);
        if (bAlpha <= 0) return;
        ctx.save(); ctx.globalAlpha = bAlpha;
        ctx.beginPath(); ctx.arc(b.wx, b.wy, b.r, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0,229,255,0.8)'; ctx.lineWidth = 0.7; ctx.stroke();
        ctx.beginPath(); ctx.arc(b.wx - b.r * 0.3, b.wy - b.r * 0.3, b.r * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
        ctx.restore();
      });
      av.thrusterBubbles = av.thrusterBubbles.filter(b => b.alpha > 0);

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(av.angle);

      const L = 58, R = 10; // body half-length, half-height
      const isInspecting = (av.state === 'hover' || av.state === 'pan' || av.state === 'slowdown');

      // Emit bubbles from rear thruster in world coords
      if (Math.random() < 0.28) {
        const rearX = x + Math.cos(av.angle + Math.PI) * L;
        const rearY = y + Math.sin(av.angle + Math.PI) * L;
        av.thrusterBubbles.push({
          wx: rearX, wy: rearY,
          dvx: Math.cos(av.angle + Math.PI) * rand(0.5, 1.2) + rand(-0.2, 0.2),
          dvy: rand(-0.5, -0.1),
          r: rand(1.2, 3), alpha: rand(0.5, 0.75), phase: rand(0, Math.PI * 2)
        });
      }

      // ── Body hull (torpedo shaped) ──
      ctx.beginPath();
      // Nose (tapered front)
      ctx.moveTo(L * 0.5, 0);
      ctx.bezierCurveTo(L * 0.6, -R * 0.3, L * 0.62, R * 0.3, L * 0.5, 0);
      // Top line
      ctx.moveTo(-L * 0.42, -R);
      ctx.lineTo(L * 0.32, -R);
      ctx.bezierCurveTo(L * 0.48, -R, L * 0.62, -R * 0.5, L * 0.65, 0);
      ctx.bezierCurveTo(L * 0.62, R * 0.5, L * 0.48, R, L * 0.32, R);
      ctx.lineTo(-L * 0.42, R);
      ctx.bezierCurveTo(-L * 0.55, R * 0.7, -L * 0.58, R * 0.3, -L * 0.58, 0);
      ctx.bezierCurveTo(-L * 0.58, -R * 0.3, -L * 0.55, -R * 0.7, -L * 0.42, -R);
      ctx.closePath();
      const hullG = ctx.createLinearGradient(0, -R, 0, R);
      hullG.addColorStop(0,   'rgba(15,50,90,0.98)');
      hullG.addColorStop(0.25,'rgba(0,100,160,0.95)');
      hullG.addColorStop(0.55,'rgba(0,70,130,0.95)');
      hullG.addColorStop(1,   'rgba(5,30,65,0.98)');
      ctx.fillStyle = hullG; ctx.fill();
      // Hull edge glow
      ctx.strokeStyle = 'rgba(0,200,255,0.45)'; ctx.lineWidth = 1.0; ctx.stroke();

      // ── Hull panel lines & rivets ──
      ctx.save(); ctx.globalAlpha = 0.22;
      ctx.strokeStyle = 'rgba(0,229,255,1)'; ctx.lineWidth = 0.6;
      for (let pl = -1; pl <= 1; pl += 2) {
        ctx.beginPath(); ctx.moveTo(-L * 0.35, pl * R * 0.52); ctx.lineTo(L * 0.25, pl * R * 0.52); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(-L * 0.1, -R * 0.9); ctx.lineTo(-L * 0.1, R * 0.9); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(L * 0.1, -R * 0.85); ctx.lineTo(L * 0.1, R * 0.85); ctx.stroke();
      for (let rv of [-L * 0.25, -L * 0.05, L * 0.15]) {
        for (let ry of [-R * 0.55, R * 0.55]) {
          ctx.beginPath(); ctx.arc(rv, ry, 1.2, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0,229,255,0.5)'; ctx.fill();
        }
      }
      ctx.restore();

      // ── Dorsal fin ──
      ctx.beginPath();
      ctx.moveTo(-L * 0.12, -R);
      ctx.bezierCurveTo(-L * 0.08, -R - 14, L * 0.06, -R - 12, L * 0.1, -R);
      ctx.closePath();
      ctx.fillStyle = 'rgba(0,80,140,0.88)';
      ctx.strokeStyle = 'rgba(0,180,230,0.4)'; ctx.lineWidth = 0.8;
      ctx.fill(); ctx.stroke();

      // ── Side stabilizer fins ──
      [[-L * 0.35, -1], [-L * 0.35, 1]].forEach(([fx, side]) => {
        ctx.beginPath();
        ctx.moveTo(fx, side * R);
        ctx.bezierCurveTo(fx + 10, side * (R + 8), fx + 20, side * (R + 6), fx + 18, side * R);
        ctx.closePath();
        ctx.fillStyle = 'rgba(0,90,150,0.85)';
        ctx.strokeStyle = 'rgba(0,180,230,0.35)'; ctx.lineWidth = 0.7;
        ctx.fill(); ctx.stroke();
      });

      // ── Main thruster housing (rear) ──
      const thrX = -L * 0.58;
      ctx.beginPath(); ctx.ellipse(thrX, 0, R * 0.55, R * 0.8, 0, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(0,200,240,0.6)'; ctx.lineWidth = 2.5; ctx.stroke();
      ctx.fillStyle = 'rgba(5,25,55,0.85)'; ctx.fill();
      // Spinning propeller blades
      ctx.save(); ctx.translate(thrX, 0); ctx.rotate(av.thrusterPhase);
      for (let b2 = 0; b2 < 5; b2++) {
        ctx.save(); ctx.rotate(b2 * Math.PI * 2 / 5);
        ctx.beginPath();
        ctx.ellipse(0, R * 0.42, 2.2, 5.5, 0.25, 0, Math.PI * 2);
        const bladeG = ctx.createLinearGradient(0, 0, 0, R * 0.75);
        bladeG.addColorStop(0, 'rgba(0,220,255,0.85)');
        bladeG.addColorStop(1, 'rgba(0,140,200,0.5)');
        ctx.fillStyle = bladeG; ctx.fill();
        ctx.restore();
      }
      // Hub
      ctx.beginPath(); ctx.arc(0, 0, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,180,230,0.9)'; ctx.fill();
      ctx.restore();

      // ── Vertical thrusters (top & bottom) ──
      [[-R - 6, -R], [-R - 6, R]].forEach(([ty, ry]) => {
        const tvx = -L * 0.08;
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(tvx - 4, ry > 0 ? R : ty, 8, 6, 2) : ctx.rect(tvx - 4, ry > 0 ? R : ty, 8, 6);
        ctx.fillStyle = 'rgba(0,100,175,0.85)'; ctx.fill();
        ctx.strokeStyle = 'rgba(0,200,240,0.45)'; ctx.lineWidth = 0.7; ctx.stroke();
        // mini prop
        ctx.save(); ctx.translate(tvx, ry > 0 ? R + 3 : -R - 3); ctx.rotate(av.thrusterPhase * 1.4);
        for (let bp = 0; bp < 3; bp++) {
          ctx.save(); ctx.rotate(bp * Math.PI * 2 / 3);
          ctx.beginPath(); ctx.ellipse(0, 3, 1.2, 3.2, 0.2, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0,200,240,0.7)'; ctx.fill();
          ctx.restore();
        }
        ctx.restore();
      });

      // ── Front camera dome ──
      const camX = L * 0.38;
      ctx.beginPath(); ctx.arc(camX, 0, R * 0.72, 0, Math.PI * 2);
      const domeG = ctx.createRadialGradient(camX - R * 0.2, -R * 0.22, 0.5, camX, 0, R * 0.72);
      domeG.addColorStop(0, 'rgba(220,250,255,0.95)');
      domeG.addColorStop(0.3, 'rgba(80,210,255,0.7)');
      domeG.addColorStop(0.75, 'rgba(0,100,180,0.6)');
      domeG.addColorStop(1, 'rgba(0,40,100,0.9)');
      ctx.fillStyle = domeG; ctx.fill();
      ctx.strokeStyle = 'rgba(0,220,255,0.75)'; ctx.lineWidth = 1.2; ctx.stroke();
      // Dome cross-hair
      ctx.save(); ctx.globalAlpha = 0.35;
      ctx.strokeStyle = 'rgba(0,229,255,1)'; ctx.lineWidth = 0.7;
      ctx.beginPath(); ctx.moveTo(camX - R * 0.5, 0); ctx.lineTo(camX + R * 0.5, 0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(camX, -R * 0.5); ctx.lineTo(camX, R * 0.5); ctx.stroke();
      ctx.beginPath(); ctx.arc(camX, 0, R * 0.35, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();

      // ── Side sensor pods ──
      [[-L * 0.18, -R - 3], [-L * 0.18, R + 3]].forEach(([sx, sy]) => {
        ctx.beginPath(); ctx.ellipse(sx, sy, 6, 3.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,80,130,0.9)'; ctx.fill();
        ctx.strokeStyle = 'rgba(0,200,230,0.5)'; ctx.lineWidth = 0.8; ctx.stroke();
      });

      // ── LED status lights ──
      av.lightFlicker = 0.85 + 0.15 * Math.sin(t * 0.12);
      const leds = [
        { x: -L * 0.25, y: -R + 1.5, c: `rgba(0,229,255,${0.9 * av.lightFlicker})`, g: 'rgba(0,229,255,' },
        { x: 0,         y: -R + 1.5, c: isInspecting ? `rgba(0,255,120,${0.95 * av.lightFlicker})` : `rgba(0,229,255,${0.9 * av.lightFlicker})`, g: isInspecting ? 'rgba(0,255,120,' : 'rgba(0,229,255,' },
        { x: L * 0.2,   y: -R + 1.5, c: `rgba(0,229,255,${0.9 * av.lightFlicker})`, g: 'rgba(0,229,255,' },
      ];
      leds.forEach(led => {
        ctx.beginPath(); ctx.arc(led.x, led.y, 2.2, 0, Math.PI * 2);
        ctx.fillStyle = led.c; ctx.fill();
        ctx.save(); ctx.globalAlpha = 0.28;
        ctx.beginPath(); ctx.arc(led.x, led.y, 7, 0, Math.PI * 2);
        const lg = ctx.createRadialGradient(led.x, led.y, 0, led.x, led.y, 7);
        lg.addColorStop(0, led.g + '1)'); lg.addColorStop(1, led.g + '0)');
        ctx.fillStyle = lg; ctx.fill(); ctx.restore();
      });

      // ── Inspection scan beam (wide fan angled down toward coral) ──
      if (isInspecting && av.scanBeamAlpha > 0.05) {
        ctx.save();
        const beamLen  = 90 + Math.sin(av.scanPhase * 1.1) * 12;
        const beamHW   = 22 + Math.sin(av.scanPhase * 0.75) * 6; // half-width at tip
        // Beam fans from nose downward-forward (~20° below horizontal)
        const bAngle   = 0.34; // radians below horizontal
        const tipX     = L * 0.65 + Math.cos(bAngle) * beamLen;
        const tipY     = Math.sin(bAngle) * beamLen;
        ctx.globalAlpha = av.scanBeamAlpha * 0.5;
        const bg2 = ctx.createLinearGradient(L * 0.65, 0, tipX, tipY);
        bg2.addColorStop(0,   'rgba(0,229,255,0.95)');
        bg2.addColorStop(0.35,'rgba(120,240,255,0.55)');
        bg2.addColorStop(1,   'rgba(0,200,255,0.0)');
        ctx.beginPath();
        ctx.moveTo(L * 0.65, -3);
        ctx.lineTo(tipX - beamHW * 0.4, tipY - beamHW);
        ctx.lineTo(tipX + beamHW * 0.4, tipY + beamHW * 0.3);
        ctx.lineTo(L * 0.65, 3);
        ctx.closePath();
        ctx.fillStyle = bg2;
        ctx.fill();
        ctx.restore();

        // Sweeping scan line inside beam
        ctx.save();
        ctx.globalAlpha = av.scanBeamAlpha * 0.8;
        const sweep = Math.sin(av.scanPhase * 2.2) * beamHW * 0.7;
        ctx.beginPath();
        ctx.moveTo(L * 0.65, sweep * 0.1);
        ctx.lineTo(tipX - sweep * 0.2, tipY + sweep);
        ctx.strokeStyle = 'rgba(0,255,160,0.95)';
        ctx.lineWidth = 1.3;
        ctx.stroke();
        ctx.restore();

        // Scanning data-point dots on beam
        ctx.save(); ctx.globalAlpha = av.scanBeamAlpha * 0.65;
        for (let dd = 0; dd < 4; dd++) {
          const ft = 0.45 + dd * 0.14;
          const dotX = L * 0.65 + (tipX - L * 0.65) * ft;
          const dotY = tipY * ft + Math.sin(av.scanPhase * 1.8 + dd * 1.4) * 5;
          ctx.beginPath(); ctx.arc(dotX, dotY, 1.8, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0,255,180,0.95)'; ctx.fill();
        }
        ctx.restore();
      }

      // ── "SRM AUV" label — large and clearly readable ──
      ctx.save();
      ctx.globalAlpha = 0.95;
      // Bright background plaque
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(-L * 0.18, -5.5, L * 0.36, 11, 2) : ctx.rect(-L * 0.18, -5.5, L * 0.36, 11);
      ctx.fillStyle = 'rgba(0,30,60,0.7)'; ctx.fill();
      ctx.strokeStyle = 'rgba(0,200,255,0.4)'; ctx.lineWidth = 0.6; ctx.stroke();
      ctx.font = 'bold 9.5px "Orbitron", "JetBrains Mono", monospace';
      ctx.fillStyle = 'rgba(0,240,255,1)';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,229,255,0.9)';
      ctx.shadowBlur = 6;
      ctx.fillText('SRM AUV', 0, 0);
      ctx.shadowBlur = 0;
      ctx.restore();

      ctx.restore();
    };

    const drawWhale = (wh) => {
      const x = wh.x * W, y = wh.y * H;
      const s = wh.size;
      const dir = wh.vx >= 0 ? 1 : -1;
      const tailSwing = Math.sin(wh.tailPhase) * s * 0.18;
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(dir, 1);
      ctx.globalAlpha = wh.alpha;

      // Body
      ctx.beginPath();
      ctx.ellipse(0, 0, s, s * 0.38, 0, 0, Math.PI * 2);
      const bg = ctx.createLinearGradient(-s, -s * 0.38, -s, s * 0.38);
      bg.addColorStop(0, 'rgba(100,180,220,0.9)');
      bg.addColorStop(0.45, 'rgba(40,110,160,0.85)');
      bg.addColorStop(1, 'rgba(20,60,100,0.8)');
      ctx.fillStyle = bg;
      ctx.fill();

      // Belly lighter patch
      ctx.beginPath();
      ctx.ellipse(s * 0.1, s * 0.12, s * 0.55, s * 0.18, 0.1, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,230,245,0.35)';
      ctx.fill();

      // Tail flukes
      ctx.save();
      ctx.translate(-s * 0.88, tailSwing * 0.5);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(-s * 0.18, -s * 0.28 + tailSwing, -s * 0.42, -s * 0.38 + tailSwing, -s * 0.5, -s * 0.22 + tailSwing);
      ctx.bezierCurveTo(-s * 0.38, -s * 0.05, -s * 0.1, s * 0.05, 0, 0);
      ctx.fillStyle = 'rgba(30,90,140,0.85)';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(-s * 0.18, s * 0.28 + tailSwing, -s * 0.42, s * 0.38 + tailSwing, -s * 0.5, s * 0.22 + tailSwing);
      ctx.bezierCurveTo(-s * 0.38, s * 0.05, -s * 0.1, -s * 0.05, 0, 0);
      ctx.fillStyle = 'rgba(30,90,140,0.85)';
      ctx.fill();
      ctx.restore();

      // Dorsal fin
      ctx.beginPath();
      ctx.moveTo(s * 0.05, -s * 0.36);
      ctx.bezierCurveTo(s * 0.12, -s * 0.72, s * 0.28, -s * 0.65, s * 0.3, -s * 0.36);
      ctx.closePath();
      ctx.fillStyle = 'rgba(35,95,145,0.9)';
      ctx.fill();

      // Pectoral fin
      ctx.beginPath();
      ctx.moveTo(s * 0.35, s * 0.08);
      ctx.bezierCurveTo(s * 0.5, s * 0.42, s * 0.22, s * 0.55, s * 0.1, s * 0.36);
      ctx.closePath();
      ctx.fillStyle = 'rgba(35,95,145,0.88)';
      ctx.fill();

      // Eye
      ctx.beginPath();
      ctx.arc(s * 0.62, -s * 0.06, s * 0.045, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.62, -s * 0.06, s * 0.025, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(10,20,40,1)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.608, -s * 0.072, s * 0.01, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fill();

      // Smile line
      ctx.beginPath();
      ctx.arc(s * 0.72, s * 0.05, s * 0.12, Math.PI * 0.1, Math.PI * 0.5);
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.restore();

      // Bubble trail from blowhole area
      if (Math.random() < 0.015) {
        const bx = x + dir * (s * 0.55);
        const by = y - s * 0.36;
        for (let b = 0; b < 2; b++) {
          bubbles.push({
            x: bx / W + rand(-0.005, 0.005),
            y: by / H,
            r: rand(1.5, 4),
            vy: rand(0.0006, 0.001),
            vx: rand(-0.0001, 0.0001),
            wobble: rand(0, Math.PI * 2),
            wobbleSpeed: rand(0.02, 0.04),
            wobbleAmp: rand(0.001, 0.003),
            alpha: rand(0.3, 0.55),
          });
        }
      }
    };

    // ── Main render loop ─────────────────────────────────────
    const draw = () => {
      t++;
      ctx.clearRect(0, 0, W, H);

      // ── Depth gradient overlay for realism ──
      const depthG = ctx.createLinearGradient(0, 0, 0, H);
      depthG.addColorStop(0, 'rgba(0,40,80,0.22)');
      depthG.addColorStop(0.5, 'rgba(0,20,50,0.0)');
      depthG.addColorStop(1, 'rgba(0,5,20,0.35)');
      ctx.fillStyle = depthG; ctx.fillRect(0, 0, W, H);

      // Light rays (more realistic, variable opacity)
      rays.forEach(r => {
        r.phase += r.speed;
        const x2 = r.x * W;
        const alpha = r.alpha * (0.55 + 0.45 * Math.sin(r.phase));
        const w2 = r.width * W;
        const g2 = ctx.createLinearGradient(x2, 0, x2 + w2 * 0.4, H * 0.75);
        g2.addColorStop(0, `rgba(120,210,255,${alpha * 0.7})`);
        g2.addColorStop(0.3, `rgba(0,180,220,${alpha * 0.4})`);
        g2.addColorStop(1, 'rgba(0,120,180,0)');
        ctx.save(); ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.moveTo(x2 - w2 * 0.5, 0);
        ctx.lineTo(x2 + w2 * 0.5, 0);
        ctx.lineTo(x2 + w2 * 1.1, H * 0.75);
        ctx.lineTo(x2 - w2 * 0.15, H * 0.75);
        ctx.closePath(); ctx.fillStyle = g2; ctx.fill(); ctx.restore();
      });

      // Seaweed at bottom
      weeds.forEach(w => drawSeaweed(w));

      // Jellyfish
      jellies.forEach(j => {
        j.phase += j.pulseSpeed;
        j.x += j.vx; 
        j.y += j.vy + Math.sin(j.phase * 0.4) * 0.00018;
        if (j.x < -0.12) j.x = 1.12;
        if (j.x > 1.12) j.x = -0.12;
        j.y = Math.max(0.02, Math.min(0.78, j.y));
        drawJelly(j);
      });

      // ── Sandy seafloor ──
      const floorY = H * 0.97;
      const floorG = ctx.createLinearGradient(0, floorY - 20, 0, H);
      floorG.addColorStop(0, 'rgba(10,35,65,0)');
      floorG.addColorStop(0.3, 'rgba(18,50,80,0.55)');
      floorG.addColorStop(1, 'rgba(8,28,55,0.9)');
      ctx.beginPath(); ctx.rect(0, floorY - 20, W, H - floorY + 20);
      ctx.fillStyle = floorG; ctx.fill();
      // Sand ripples
      ctx.save(); ctx.globalAlpha = 0.12;
      ctx.strokeStyle = 'rgba(100,160,200,1)'; ctx.lineWidth = 0.8;
      for (let ri = 0; ri < 12; ri++) {
        const ry = floorY + ri * 4;
        ctx.beginPath();
        for (let rx = 0; rx < W; rx += 20) {
          const offset = Math.sin(rx * 0.03 + ri * 0.7 + t * 0.003) * 2;
          if (rx === 0) ctx.moveTo(rx, ry + offset); else ctx.lineTo(rx, ry + offset);
        }
        ctx.stroke();
      }
      ctx.restore();

      // Coral reefs (drawn before AUV so AUV appears on top)
      coralClusters.forEach(cl => {
        cl.phase += 0.007;
        drawCoral(cl);
      });

      // AUV inspection spotlight on targeted coral
      if (auv.scanBeamAlpha > 0.05) {
        const glowTgt = sortedCorals[auv.targetIdx];
        const gx = glowTgt.x * W, gy = H * 0.88;
        const glowR = 65 + Math.sin(auv.scanPhase * 0.9) * 8;
        ctx.save();
        ctx.globalAlpha = auv.scanBeamAlpha * 0.28;
        const coralGlow = ctx.createRadialGradient(gx, gy, 4, gx, gy, glowR);
        coralGlow.addColorStop(0,   'rgba(0,229,255,0.9)');
        coralGlow.addColorStop(0.4, 'rgba(0,200,255,0.4)');
        coralGlow.addColorStop(1,   'rgba(0,150,220,0.0)');
        ctx.beginPath(); ctx.arc(gx, gy, glowR, 0, Math.PI * 2);
        ctx.fillStyle = coralGlow; ctx.fill();
        ctx.restore();
      }

      // ── AUV state machine ──────────────────────────────────
      auv.scanPhase += 0.04;
      auv.bobPhase  += 0.016;
      auv.thrusterPhase += (auv.state === 'hover' || auv.state === 'pan') ? 0.04 : 0.13;

      const tgt   = sortedCorals[auv.targetIdx];
      const tgtWX = tgt.x * W;          // coral world-x
      const tgtWY = H * 0.855;          // coral inspection depth (just above reef)

      // ── CRUISE: fly straight toward next coral at a comfortable approach height ──
      if (auv.state === 'cruise') {
        auv.scanBeamAlpha = Math.max(0, auv.scanBeamAlpha - 0.04);

        // Steer toward a waypoint 90px in front of the coral, same y
        const wpX = tgtWX - 90;   // stop 90px to the left of coral
        const wpY = tgtWY - 18;   // slightly above reef level
        const dx  = wpX - auv.x * W;
        const dy  = wpY - auv.y * H;
        const desired = Math.atan2(dy, dx);
        // Smooth angle interpolation — avoid spinning
        let da = desired - auv.angle;
        while (da >  Math.PI) da -= Math.PI * 2;
        while (da < -Math.PI) da += Math.PI * 2;
        auv.angle += da * 0.025;

        const spd = auv.speed * W;
        auv.x += (Math.cos(auv.angle) * spd) / W;
        auv.y += (Math.sin(auv.angle) * spd) / H;
        // Gentle bob
        auv.y += Math.sin(auv.bobPhase) * 0.00006;

        const dist = Math.hypot(auv.x * W - wpX, auv.y * H - wpY);
        if (dist < 28) {
          auv.state = 'slowdown';
          auv.timer = 0;
        }
        // Wrap around after passing last coral
        if (auv.x > 1.12) {
          auv.x = -0.06;
          auv.y = 0.80;
          auv.angle = 0;
          auv.targetIdx = 0;
        }

      // ── SLOWDOWN: brake and align perpendicular to coral, light fades in ──
      } else if (auv.state === 'slowdown') {
        auv.timer++;
        auv.scanBeamAlpha = Math.min(0.9, auv.timer / 50);

        // Glide to hover point: directly left of coral, facing right
        const hoverX = tgtWX - 80;
        const hoverY = tgtWY;
        const dx2 = hoverX - auv.x * W;
        const dy2 = hoverY - auv.y * H;
        auv.x += (dx2 * 0.032) / W;
        auv.y += (dy2 * 0.032) / H;
        // Rotate to face coral (angle = 0, pointing right)
        let da2 = 0 - auv.angle;
        while (da2 >  Math.PI) da2 -= Math.PI * 2;
        while (da2 < -Math.PI) da2 += Math.PI * 2;
        auv.angle += da2 * 0.06;

        if (auv.timer > 80) {
          auv.state = 'hover';
          auv.timer = 0;
        }

      // ── HOVER: stationary, light fully on, held for a beat ──
      } else if (auv.state === 'hover') {
        auv.timer++;
        auv.scanBeamAlpha = 0.92 + 0.08 * Math.sin(auv.scanPhase * 0.8);

        // Micro-drift to feel alive
        auv.x += Math.sin(auv.bobPhase * 0.7) * 0.000025;
        auv.y += Math.sin(auv.bobPhase * 1.1) * 0.000018;

        // Keep angle locked at 0 (facing coral)
        let da3 = 0 - auv.angle;
        while (da3 >  Math.PI) da3 -= Math.PI * 2;
        while (da3 < -Math.PI) da3 += Math.PI * 2;
        auv.angle += da3 * 0.08;

        if (auv.timer > 120) {
          auv.state = 'pan';
          auv.timer = 0;
        }

      // ── PAN: slowly glide forward past the coral, light illuminating it ──
      } else if (auv.state === 'pan') {
        auv.timer++;
        auv.scanBeamAlpha = 0.88 + 0.12 * Math.sin(auv.scanPhase * 0.6);

        // Creep forward very slowly, maintaining depth
        auv.x += (auv.speed * 0.38 * W) / W;
        auv.y += (tgtWY - auv.y * H) * 0.008 / H;
        // Keep level
        let da4 = 0 - auv.angle;
        while (da4 >  Math.PI) da4 -= Math.PI * 2;
        while (da4 < -Math.PI) da4 += Math.PI * 2;
        auv.angle += da4 * 0.05;

        if (auv.timer > 160) {
          auv.state = 'depart';
          auv.timer = 0;
        }

      // ── DEPART: accelerate away, light fades off, move to next target ──
      } else if (auv.state === 'depart') {
        auv.timer++;
        auv.scanBeamAlpha = Math.max(0, 0.9 - auv.timer / 35);

        // Pick up speed heading right
        const departSpd = auv.speed * (1 + auv.timer * 0.012);
        auv.x += (Math.cos(auv.angle) * departSpd * W) / W;
        auv.y += Math.sin(auv.bobPhase * 0.5) * 0.00007;
        let da5 = 0 - auv.angle;
        while (da5 >  Math.PI) da5 -= Math.PI * 2;
        while (da5 < -Math.PI) da5 += Math.PI * 2;
        auv.angle += da5 * 0.04;

        if (auv.timer > 55) {
          auv.targetIdx = (auv.targetIdx + 1) % sortedCorals.length;
          auv.state = 'cruise';
          auv.timer = 0;
          auv.scanBeamAlpha = 0;
        }
      }

      // Clamp y
      auv.y = Math.max(0.65, Math.min(0.92, auv.y));
      drawAUV(auv);

      // Whale
      whale.phase += 0.009;
      whale.tailPhase += 0.044;
      whale.x += whale.vx;
      // gentle vertical sine drift
      whale.y += Math.sin(whale.phase * 0.8) * 0.000035;
      // clamp to mid-lower band, clear of title text
      whale.y = Math.max(0.58, Math.min(0.70, whale.y));
      // fade in once it enters visible area
      if (whale.x > 0.0 && whale.x < 1.0) {
        whale.alpha = Math.min(0.75, whale.alpha + 0.006);
      }
      // reset to opposite side once fully off-screen
      if (whale.x < -0.32 || whale.x > 1.32) {
        const newSide = whale.vx > 0 ? -1 : 1; // flip direction
        whale.x = newSide === 1 ? 1.3 : -0.3;
        whale.y = rand(0.60, 0.70);
        whale.vx = -newSide * rand(0.00020, 0.00028);
        whale.alpha = 0;
      }
      drawWhale(whale);

      // Plankton
      plankton.forEach(p => {
        p.phase += p.pulseSpeed; p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
        if (p.y < 0) p.y = 1; if (p.y > 1) p.y = 0;
        const a = p.alpha * (0.5 + 0.5 * Math.sin(p.phase));
        ctx.beginPath();
        ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,229,255,${a})`;
        ctx.fill();
      });

      // Fish
      fish.forEach(f => {
        f.tailPhase += f.tailSpeed;
        f.wobble += 0.02;
        f.x += f.vx + Math.sin(f.wobble) * 0.00005;
        f.y += f.vy + Math.sin(f.wobble * 0.5) * 0.00008;
        if (f.x > 1.4) f.x = -0.3;
        if (f.x < -0.4) f.x = 1.3;
        f.y = Math.max(0.05, Math.min(0.92, f.y));
        drawFish(f);
      });

      // Bubbles (on top)
      bubbles.forEach(b => {
        b.wobble += b.wobbleSpeed; b.y -= b.vy; b.x += b.vx + Math.sin(b.wobble) * b.wobbleAmp;
        if (b.y < -0.02) { b.y = 1.05; b.x = rand(0, 1); }
        if (b.x < 0) b.x = 1; if (b.x > 1) b.x = 0;
        const bx = b.x * W, by = b.y * H;
        ctx.save();
        ctx.globalAlpha = b.alpha;
        // Bubble circle
        ctx.beginPath();
        ctx.arc(bx, by, b.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(0,229,255,0.8)`;
        ctx.lineWidth = 0.6;
        ctx.stroke();
        // Bubble shine
        ctx.beginPath();
        ctx.arc(bx - b.r * 0.3, by - b.r * 0.35, b.r * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fill();
        ctx.restore();
      });

      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, [intensity]);
  return <canvas ref={ref} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }} />;
}

/* Simple lightweight bubbles-only for inner pages */
function Particles({ count = 60 }) {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext('2d');
    let raf, w, h;
    const pts = Array.from({ length: count }, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.8 + 0.4,
      vx: (Math.random() - .5) * .0002,
      vy: -Math.random() * .0004 - .0001,
      a: Math.random() * .5 + .05,
      p: Math.random() * Math.PI * 2,
    }));
    const resize = () => { w = c.width = c.offsetWidth; h = c.height = c.offsetHeight; };
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(c);
    const draw = () => {
      ctx.clearRect(0, 0, w, h);
      pts.forEach(p => {
        p.p += .015; p.x += p.vx; p.y += p.vy;
        if (p.y < -.01) { p.y = 1.01; p.x = Math.random(); }
        if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
        const a = p.a * (.6 + .4 * Math.sin(p.p));
        ctx.beginPath(); ctx.arc(p.x * w, p.y * h, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,229,255,${a})`; ctx.fill();
      });
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, [count]);
  return <canvas ref={ref} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }} />;
}

/* ═══════════════════════════════════════════════════════════════
   SCROLL REVEAL
═══════════════════════════════════════════════════════════════ */
function Reveal({ children, delay = 0, style = {} }) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVis(true); obs.disconnect(); } }, { threshold: .08 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{ opacity: vis ? 1 : 0, transform: vis ? "none" : "translateY(28px)", transition: `opacity .7s ease ${delay}ms, transform .7s ease ${delay}ms`, ...style }}>
      {children}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   CURSOR GLOW
═══════════════════════════════════════════════════════════════ */
function CursorGlow() {
  const dotRef  = useRef(null);
  const ringRef = useRef(null);
  const pos     = useRef({ x: -200, y: -200 });
  const ring    = useRef({ x: -200, y: -200 });
  const lastTrail = useRef(0);

  useEffect(() => {
    const dot = dotRef.current, rng = ringRef.current;
    if (!dot || !rng) return;
    let raf;

    const onMove = (e) => {
      pos.current = { x: e.clientX, y: e.clientY };
      dot.style.left = e.clientX + "px";
      dot.style.top  = e.clientY + "px";
      const now = Date.now();
      if (now - lastTrail.current > 45) {
        lastTrail.current = now;
        const tr = document.createElement("div");
        tr.className = "cur-trail";
        tr.style.left = e.clientX + "px";
        tr.style.top  = e.clientY + "px";
        document.body.appendChild(tr);
        setTimeout(() => tr.parentNode && tr.parentNode.removeChild(tr), 700);
      }
    };

    const addHover = () => rng.classList.add("hovering");
    const rmHover  = () => rng.classList.remove("hovering");
    document.addEventListener("mousemove", onMove);
    document.querySelectorAll("a,button,[role=button],[tabindex]").forEach(el => {
      el.addEventListener("mouseenter", addHover);
      el.addEventListener("mouseleave", rmHover);
    });

    const animate = () => {
      ring.current.x += (pos.current.x - ring.current.x) * 0.13;
      ring.current.y += (pos.current.y - ring.current.y) * 0.13;
      rng.style.left = ring.current.x + "px";
      rng.style.top  = ring.current.y + "px";
      raf = requestAnimationFrame(animate);
    };
    animate();
    return () => { document.removeEventListener("mousemove", onMove); cancelAnimationFrame(raf); };
  }, []);

  return (<><div id="cur-dot" ref={dotRef}/><div id="cur-ring" ref={ringRef}/></>);
}

/* ═══════════════════════════════════════════════════════════════
   LAZY IMAGE
═══════════════════════════════════════════════════════════════ */
function LazyImg({ src, alt, style = {}, className = "", objectPosition = "center" }) {
  const ref = useRef(null);
  const [show, setShow] = useState(false);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setShow(true); obs.disconnect(); } }, { rootMargin: "180px" });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <img ref={ref}
      src={show ? src : undefined}
      alt={alt}
      onLoad={() => setLoaded(true)}
      className={`lazy-load${loaded ? " loaded" : ""} ${className}`}
      style={{ ...style, objectPosition }}
    />
  );
}

/* ═══════════════════════════════════════════════════════════════
   ANIMATED COUNTER STAT
═══════════════════════════════════════════════════════════════ */
function CountStat({ num, suffix = "", label }) {
  const ref = useRef(null);
  const [count, setCount] = useState(0);
  const [fired, setFired] = useState(false);

  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !fired) { setFired(true); obs.disconnect(); }
    }, { threshold: 0.5 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [fired]);

  useEffect(() => {
    if (!fired) return;
    let frame = 0; const total = 60;
    const tick = () => {
      frame++;
      const p = 1 - Math.pow(1 - frame / total, 3);
      setCount(Math.round(p * num));
      if (frame < total) requestAnimationFrame(tick);
      else setCount(num);
    };
    requestAnimationFrame(tick);
  }, [fired, num]);

  return (
    <div ref={ref} style={{ textAlign: "center", minWidth: 72 }}>
      <div style={{
        fontFamily: "'Orbitron',monospace", fontSize: "clamp(1.6rem,3vw,2.8rem)",
        fontWeight: 900, color: C.accent, textShadow: "0 0 24px rgba(0,229,255,0.4)",
        animation: fired ? "countPop .5s cubic-bezier(.22,1,.36,1) both" : "none",
      }}>{fired ? count : 0}{suffix}</div>
      <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: C.muted, letterSpacing: 3, marginTop: 6, textTransform: "uppercase" }}>{label}</div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   3D TILT CARD
═══════════════════════════════════════════════════════════════ */
function TiltCard({ children, style = {}, className = "" }) {
  const ref = useRef(null);
  const onMove = (e) => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const dx = (e.clientX - r.left - r.width  / 2) / (r.width  / 2);
    const dy = (e.clientY - r.top  - r.height / 2) / (r.height / 2);
    el.style.transform = `perspective(900px) rotateX(${-dy * 9}deg) rotateY(${dx * 9}deg) scale(1.025)`;
    el.style.transition = "transform .06s ease";
    const glare = el.querySelector(".tilt-glare");
    if (glare) {
      glare.style.setProperty("--gx", ((e.clientX - r.left) / r.width * 100) + "%");
      glare.style.setProperty("--gy", ((e.clientY - r.top)  / r.height * 100) + "%");
    }
  };
  const onLeave = () => {
    if (!ref.current) return;
    ref.current.style.transform = "perspective(900px) rotateX(0) rotateY(0) scale(1)";
    ref.current.style.transition = "transform .5s cubic-bezier(.22,1,.36,1)";
  };
  return (
    <div ref={ref} className={`tilt-wrap ${className}`} onMouseMove={onMove} onMouseLeave={onLeave}
      style={{ position: "relative", ...style }}>
      <div className="tilt-glare" />
      {children}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════════════════════════════ */
function Lightbox({ images, startIdx, onClose }) {
  const [idx, setIdx] = useState(startIdx);
  const img = images[idx];
  const prev = () => setIdx(i => (i - 1 + images.length) % images.length);
  const next = () => setIdx(i => (i + 1) % images.length);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      if (e.key === "ArrowLeft")  prev();
      if (e.key === "ArrowRight") next();
    };
    document.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => { document.removeEventListener("keydown", onKey); document.body.style.overflow = ""; };
  }, [images.length]);

  return (
    <div className="lb-bg" onClick={onClose}>
      <button className="lb-x" onClick={onClose}>✕</button>
      {images.length > 1 && <>
        <button className="lb-arrow" style={{ left: 16 }} onClick={e => { e.stopPropagation(); prev(); }}>‹</button>
        <button className="lb-arrow" style={{ right: 16 }} onClick={e => { e.stopPropagation(); next(); }}>›</button>
      </>}
      <img key={idx} className="lb-img" src={img.photo} alt={img.label} onClick={e => e.stopPropagation()} />
      <div className="lb-caption" onClick={e => e.stopPropagation()}>
        <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: C.accent, letterSpacing: 3 }}>{img.year} · {img.cat}</div>
        <div style={{ fontFamily: "'Syne',sans-serif", fontSize: ".85rem", color: "#fff", marginTop: 2 }}>{img.label}</div>
        <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 8, color: C.muted, marginTop: 3 }}>{idx + 1} / {images.length}</div>
      </div>
    </div>
  );
}

                  onMouseEnter={e => e.target.style.color = C.accent}
                  onMouseLeave={e => e.target.style.color = C.muted}>{l}</button>
              ))}
            </div>
          ))}
        </div>
          <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 24, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 }}>
          <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 10, color: C.muted }}>© 2025 Team SRM AUV · All rights reserved · srmauvteam@gmail.com</div>
          <div style={{ display: "flex", gap: 16 }}>
            {[
              { label: "Instagram", href: "https://www.instagram.com/srm.auv" },
              { label: "LinkedIn",  href: "https://in.linkedin.com/company/team-srmauv" },
              { label: "Email",     href: "mailto:srmauvteam@gmail.com" },
            ].map(({ label, href }) => (
              <a key={label} href={href} target={href.startsWith("mailto") ? "_self" : "_blank"} rel="noopener noreferrer"
                style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 10, color: C.muted, textDecoration: "none", transition: "color .2s", cursor: "pointer" }}
                onMouseEnter={e => e.currentTarget.style.color = C.accent}
                onMouseLeave={e => e.currentTarget.style.color = C.muted}
              >{label}</a>
            ))}
          </div>
          </div>
        </div>
      </div>
    </footer>
  );
}

/* ═══════════════════════════════════════════════════════════════
   SCROLL PROGRESS BAR
═══════════════════════════════════════════════════════════════ */
function ScrollProgress() {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const h = () => {
      const s = document.documentElement.scrollTop;
      const max = document.documentElement.scrollHeight - window.innerHeight;
      setPct(max > 0 ? (s / max) * 100 : 0);
    };
    window.addEventListener("scroll", h);
    return () => window.removeEventListener("scroll", h);
  }, []);
  return <div style={{ position: "fixed", top: 0, left: 0, height: 2, width: `${pct}%`, background: `linear-gradient(90deg,${C.accent},${C.accent2})`, zIndex: 300, transition: "width .1s" }} />;
}

/* ═══════════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState("home");
  const [history, setHistory] = useState(["home"]);
  const [transition, setTransition] = useState("page-enter");
  const prevPageRef = useRef("home");

  const navigate = (p) => {
    // Choose animation direction based on nav structure
    const order = ["home","about","team","vehicles","nemo","achievements","competitions","gallery","contact"];
    const prev = prevPageRef.current;
    const prevIdx = order.indexOf(prev);
    const nextIdx = order.indexOf(p);
    const dir = nextIdx > prevIdx ? "page-from-right" : nextIdx < prevIdx ? "page-from-left" : "page-enter";
    prevPageRef.current = p;
    setTransition(dir);
    setHistory(h => [...h, p]);
    setPage(p);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const goBack = () => {
    if (history.length > 1) {
      const newHistory = history.slice(0, -1);
      setHistory(newHistory);
      const prev = newHistory[newHistory.length - 1];
      prevPageRef.current = prev;
      setTransition("page-from-left");
      setPage(prev);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  };

  const canGoBack = history.length > 1;

  const renderPage = () => {
    switch (page) {
      case "home":         return <HomePage setPage={navigate} />;
      case "about":        return <AboutPage goBack={goBack} canGoBack={canGoBack} />;
      case "team":         return <TeamPage goBack={goBack} canGoBack={canGoBack} />;
      case "vehicles":     return <VehiclesPage setPage={navigate} goBack={goBack} canGoBack={canGoBack} />;
      case "nemo":         return <NemoPage setPage={navigate} goBack={goBack} canGoBack={canGoBack} />;
      case "achievements": return <AchievementsPage goBack={goBack} canGoBack={canGoBack} />;
      case "competitions": return <CompetitionsPage goBack={goBack} canGoBack={canGoBack} />;
      case "gallery":      return <GalleryPage goBack={goBack} canGoBack={canGoBack} />;
      case "contact":      return <ContactPage goBack={goBack} canGoBack={canGoBack} />;
      default:             return <HomePage setPage={navigate} />;
    }
  };

  return (
    <>
      <GlobalStyle />
      <LoadingScreen />
      <CursorGlow />
      <ScrollProgress />
      <Navbar page={page} setPage={navigate} goBack={goBack} canGoBack={canGoBack} />
      <main key={page} className={transition} style={{ paddingTop: 64 }}>
        {renderPage()}
      </main>
      <Footer setPage={navigate} />
    </>
  );
}



  
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
